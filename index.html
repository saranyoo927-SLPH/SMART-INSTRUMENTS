<script>
    // 👇👇👇 เอาลิงก์ Web App URL จาก Google Apps Script (ที่ลงท้ายด้วย /exec) มาวางในเครื่องหมายคำพูดด้านล่างนี้ 👇👇👇
    const API_URL = 'https://script.google.com/macros/s/AKfycbxLy8-GzLbliBTDsQBLa1D0vDxyNbdiGSSAtPeOuOwQvZ9qyu70SuVcwy-dHbciwPU2jQ/exec'; 

    // ฟังก์ชันใหม่สำหรับยิง API ไปหา Google
    async function callGoogleAPI(action, payload) {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: action, ...payload })
      });
      return await response.json();
    }

    // Navigation
    function switchPage(page) {
      ['calc', 'table', 'verify'].forEach(p => {
        document.getElementById('page-' + p).classList.add('d-none');
        document.getElementById('menu-' + p).classList.remove('active');
      });
      document.getElementById('page-' + page).classList.remove('d-none');
      document.getElementById('menu-' + page).classList.add('active');
      if(page === 'table' && document.getElementById('tableS1Body').innerHTML.includes('กำลังดึงข้อมูล')) searchSheet1();
    }

    // ================= โค้ดของระบบใหม่ (แก้ไขเป็น Fetch API) =================
    function processExcel() {
      const fileInput = document.getElementById('excelUpload');
      const errorAlert = document.getElementById('errorVerify');
      const section = document.getElementById('verifyResultsSection');
      
      errorAlert.classList.add('d-none');
      section.classList.add('d-none');
      
      if (!fileInput.files.length) {
        errorAlert.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-2"></i> กรุณาเลือกไฟล์ Excel ก่อนครับ';
        errorAlert.classList.remove('d-none');
        return;
      }

      document.getElementById('loadingVerify').classList.remove('d-none');
      const reader = new FileReader();

      reader.onload = async function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, {type: 'array'});
          const sheetName = workbook.SheetNames[0];
          const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {header: 1});

          let isSection02 = false;
          let extracted = [];
          
          for (let i = 0; i < rows.length; i++) {
            let colA = rows[i][0] ? rows[i][0].toString().trim() : "";
            if (colA.includes("[02] อวัยวะเทียม")) { isSection02 = true; continue; }
            if (isSection02 && colA.includes("หมวดค่ารักษา:")) break; 
            
            if (isSection02) {
              let itemName = rows[i][1]; 
              if (itemName) {
                 let adpCode = "";
                 let match = itemName.toString().match(/\[([^\]]+)\][^\[\]]*$/);
                 if (match) adpCode = match[1];
                 
                 extracted.push({
                     name: itemName.toString(),
                     unit: rows[i][2] || "-",             
                     rightStr: rows[i][4] || "",          
                     qty: Number(rows[i][6]) || 0,        
                     unitPrice: Number(rows[i][7]) || 0,  
                     adpCode: adpCode
                 });
              }
            }
          }

          if(extracted.length === 0) {
            document.getElementById('loadingVerify').classList.add('d-none');
            errorAlert.innerHTML = '<i class="bi bi-x-circle-fill me-2"></i> ไม่พบข้อมูล "หมวดค่ารักษา: [02]" ในไฟล์นี้ครับ';
            errorAlert.classList.remove('d-none');
            return;
          }

          // ยิงข้อมูลไปให้ Google ประมวลผล
          const res = await callGoogleAPI('analyzeUploadedData', { items: extracted });
          displayVerifyResults(res);

        } catch (err) {
          document.getElementById('loadingVerify').classList.add('d-none');
          errorAlert.textContent = "ไฟล์ขัดข้อง: " + err.message;
          errorAlert.classList.remove('d-none');
        }
      };
      reader.readAsArrayBuffer(fileInput.files[0]);
    }

    function displayVerifyResults(res) {
      document.getElementById('loadingVerify').classList.add('d-none');
      const errorAlert = document.getElementById('errorVerify');
      const tbody = document.getElementById('verifyTableBody');
      const tfoot = document.getElementById('verifyTableFoot');
      
      errorAlert.classList.add('d-none');
      errorAlert.classList.remove('alert-warning');
      errorAlert.classList.add('alert-danger');
      
      if (res.error) {
        errorAlert.textContent = res.error;
        errorAlert.classList.remove('d-none');
        return;
      }
      
      tbody.innerHTML = '';
      let mismatchCount = 0; 
      
      res.data.forEach(item => {
        let isMismatch = (item.unitPrice !== item.coveredUnitPrice) && (item.coveredUnitPrice > 0);
        let trClass = "";
        let unitPriceCell = "";
        
        if (isMismatch) {
          mismatchCount++;
          trClass = "table-warning border-warning"; 
          unitPriceCell = `
            <td class="td-num">
              <div class="text-danger fw-bold fs-5">${item.unitPrice.toLocaleString()}</div>
              <div class="badge bg-danger badge-alert mt-2 px-2 py-1 shadow-sm text-wrap lh-base" style="font-size:0.8rem;">
                <i class="bi bi-exclamation-triangle-fill"></i> ไม่ตรงตาราง<br>อ้างอิง: ${item.coveredUnitPrice.toLocaleString()}
              </div>
            </td>`;
        } else if (item.coveredUnitPrice === 0 && item.adpCode && item.adpCode !== "-") {
           unitPriceCell = `
            <td class="td-num">
              <div class="text-dark">${item.unitPrice.toLocaleString()}</div>
              <div class="badge bg-secondary mt-1 px-2 py-1" style="font-size:0.7rem;">ไม่มีราคาในตาราง</div>
            </td>`;
        } else {
          unitPriceCell = `<td class="td-num text-dark fw-bold">${item.unitPrice.toLocaleString()}</td>`;
        }

        tbody.innerHTML += `<tr class="${trClass}">
          <td class="td-text fw-semibold">
            ${item.name}
            <div class="text-muted small mt-1">
              <span class="badge bg-secondary">รหัส: ${item.adpCode}</span> 
              <span class="badge bg-info text-dark">สิทธิตรวจพบ: ${item.rightUsed}</span>
            </div>
          </td>
          <td class="td-center fw-bold text-primary fs-5">${item.qty}</td>
          <td class="td-center text-muted">${item.unit}</td>
          ${unitPriceCell}
          <td class="td-num text-dark fw-bold">${item.totalPrice.toLocaleString()}</td>
          <td class="td-num text-success fw-bold">${item.totalCovered.toLocaleString()}</td>
          <td class="td-num text-danger fw-bold fs-6">${item.excess.toLocaleString()}</td>
        </tr>`;
      });
      
      tfoot.innerHTML = `<tr>
        <td colspan="4" class="td-num fs-5 text-success"><strong>สรุปยอดรวมทั้งหมด :</strong></td>
        <td class="td-num fs-5 text-dark"><strong>${res.summary.totalCost.toLocaleString()} ฿</strong></td>
        <td class="td-num fs-5 text-success"><strong>${res.summary.totalCovered.toLocaleString()} ฿</strong></td>
        <td class="td-num fs-4 text-danger"><strong>${res.summary.totalExcess.toLocaleString()} ฿</strong></td>
      </tr>`;
      
      if (mismatchCount > 0) {
        errorAlert.classList.replace('alert-danger', 'alert-warning');
        errorAlert.innerHTML = `
          <div class="d-flex align-items-center">
            <i class="bi bi-exclamation-triangle-fill fs-2 me-3 text-danger"></i> 
            <div>
               <div class="fs-5 text-dark"><strong>แจ้งเตือน:</strong> ตรวจพบรายการที่ "ราคาต่อหน่วย" ไม่ตรงกับตารางอ้างอิงจำนวน <span class="text-danger fs-4">${mismatchCount}</span> รายการ</div>
               <div class="text-muted fw-normal">กรุณาตรวจสอบว่าอาจเกิดจากการนำ "ราคารวม" มาคีย์ใส่ช่อง "ราคาต่อหน่วย" แล้วใส่จำนวนเป็น 1 หรือไม่</div>
            </div>
          </div>
        `;
        errorAlert.classList.remove('d-none');
      }

      document.getElementById('verifyResultsSection').classList.remove('d-none');
    }

    // ================= โค้ดเดิม (หน้า 1 และ หน้า 2) เปลี่ยนเป็น Fetch =================
    async function searchSheet1() {
      const code = document.getElementById('searchS1Code').value.trim();
      const name = document.getElementById('searchS1Name').value.trim();
      document.getElementById('loadingS1').classList.remove('d-none');
      document.getElementById('errorS1').classList.add('d-none');
      document.getElementById('tableS1Body').innerHTML = '';
      
      try {
        const res = await callGoogleAPI('searchSheet1Data', { code: code, name: name });
        document.getElementById('loadingS1').classList.add('d-none');
        if (res.error) return;
        const tbody = document.getElementById('tableS1Body');
        res.data.forEach(item => {
          tbody.innerHTML += `<tr><td class="td-center fw-bold text-dark">${item.code}</td><td class="td-text text-wrap" style="min-width: 280px; font-weight: 500;">${item.name}</td><td class="td-center text-muted">${item.cat}</td><td class="td-center text-muted">${item.unit}</td><td class="td-num text-dark">${item.ofc.toLocaleString()}</td><td class="td-num text-dark">${item.ucs.toLocaleString()}</td><td class="td-num text-dark">${item.lgo.toLocaleString()}</td><td class="td-num text-dark">${item.bkk.toLocaleString()}</td><td class="td-num text-dark">${item.bmt.toLocaleString()}</td><td class="td-num text-dark">${item.nhs.toLocaleString()}</td><td class="td-num text-dark">${item.sss.toLocaleString()}</td></tr>`;
        });
      } catch (e) {
        document.getElementById('loadingS1').classList.add('d-none');
      }
    }
    
    let currentSearchResults = [], cartItems = [];
    async function checkHN() {
      const hn = document.getElementById('hnInput').value.trim();
      if (!hn) return;
      const btn = document.getElementById('btnCheckHn');
      btn.innerHTML = '...'; btn.disabled = true;
      document.getElementById('errorAlert').classList.add('d-none');
      
      try {
        const res = await callGoogleAPI('checkPatientRight', { hn: hn });
        btn.innerHTML = 'ตรวจสอบ'; btn.disabled = false;
        if (res.error) {
           document.getElementById('errorAlert').innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i>${res.error}`;
           document.getElementById('errorAlert').classList.remove('d-none');
        } else if (res.right) {
          const select = document.getElementById('rightsType');
          for (let i = 0; i < select.options.length; i++) if (select.options[i].value === res.right) { select.selectedIndex = i; renderCart(); break; }
        }
      } catch (e) {}
    }

    async function performSearch() {
      const kw = document.getElementById('keyword').value.trim();
      if (!kw) return;
      document.getElementById('searchResultsSection').classList.add('d-none');
      document.getElementById('loading').classList.remove('d-none');
      
      try {
        const res = await callGoogleAPI('searchEquipmentData', { keyword: kw });
        document.getElementById('loading').classList.add('d-none');
        currentSearchResults = res.data || [];
        const tbody = document.getElementById('searchResultsBody');
        tbody.innerHTML = '';
        if (currentSearchResults.length === 0) {
           tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger py-4"><i class="bi bi-search me-2"></i>ไม่พบข้อมูลที่ค้นหา</td></tr>';
        } else {
           currentSearchResults.forEach((item, index) => tbody.innerHTML += `<tr><td class="td-center fw-bold text-secondary">${item.code}</td><td class="td-text fw-semibold">${item.name}</td><td class="td-num text-dark">${item.unitcost.toLocaleString()} ฿</td><td class="td-center"><button class="btn btn-sm btn-outline-primary fw-bold px-3" onclick="addToCart(${index})"><i class="bi bi-plus-lg"></i> เพิ่ม</button></td></tr>`);
        }
        document.getElementById('searchResultsSection').classList.remove('d-none');
      } catch (e) {}
    }
    
    function addToCart(i) { cartItems.push({ ...currentSearchResults[i], qty: 1 }); document.getElementById('keyword').value = ''; document.getElementById('searchResultsSection').classList.add('d-none'); renderCart(); }
    function updateQty(i, v) { if (parseInt(v) >= 1) { cartItems[i].qty = parseInt(v); renderCart(); } }
    function removeFromCart(i) { cartItems.splice(i, 1); renderCart(); }
    function renderCart() {
      const tbody = document.getElementById('cartBody'), tfoot = document.getElementById('cartFoot'), rt = document.getElementById('rightsType').value;
      tbody.innerHTML = ''; tfoot.innerHTML = '';
      if (cartItems.length === 0) return tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-5"><i class="bi bi-inbox fs-1 d-block mb-2 text-light"></i>ยังไม่มีรายการ</td></tr>';
      let totals = { qty: 0, uc: 0, cov: 0, ex: 0 };
      cartItems.forEach((item, i) => {
        let cov = item[rt] || 0, ex = Math.max(item.unitcost - cov, 0);
        totals.qty += item.qty; totals.uc += (item.unitcost * item.qty); totals.cov += (cov * item.qty); totals.ex += (ex * item.qty);
        tbody.innerHTML += `<tr><td class="td-center fw-bold text-secondary">${item.code}</td><td class="td-text fw-semibold">${item.name}</td><td class="td-center"><input type="number" class="form-control form-control-sm qty-input" min="1" value="${item.qty}" onchange="updateQty(${i}, this.value)"></td><td class="td-num text-muted">${(item.unitcost * item.qty).toLocaleString()}</td><td class="td-num text-success fw-bold">${(cov * item.qty).toLocaleString()}</td><td class="td-num text-danger fw-bold">${(ex * item.qty).toLocaleString()}</td><td class="td-center"><button class="btn btn-sm btn-outline-danger border-0" onclick="removeFromCart(${i})"><i class="bi bi-trash3-fill"></i></button></td></tr>`;
      });
      tfoot.innerHTML = `<tr><td colspan="2" class="td-num fs-6 text-success"><strong>รวม :</strong></td><td class="td-center fs-6"><strong>${totals.qty} ชิ้น</strong></td><td class="td-num fs-6 text-muted"><strong>${totals.uc.toLocaleString()}</strong></td><td class="td-num text-success fs-5"><strong>${totals.cov.toLocaleString()}</strong></td><td class="td-num text-danger fs-5"><strong>${totals.ex.toLocaleString()}</strong></td><td></td></tr>`;
    }
  </script>
